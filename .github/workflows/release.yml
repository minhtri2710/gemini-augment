name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version from tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          node -e '
          const fs = require("fs");
          const version = process.env.VERSION;
          for (const file of ["package.json", "package-lock.json", "gemini-extension.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.version = version;
            if (file === "package-lock.json" && data.packages?.[""]) {
              data.packages[""] = { ...data.packages[""], version };
            }
            fs.writeFileSync(file, `${JSON.stringify(data, null, "\t")}\n`);
          }
          '
        shell: bash

      - name: Verify release build
        run: npm run check

      - name: Create release archive
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ASSET_NAME="gemini-augment-${GITHUB_REF_NAME}.tar.gz"
          tar -czf "$ASSET_NAME" \
            dist \
            commands \
            skills \
            gemini-extension.json \
            package.json \
            package-lock.json \
            GEMINI.md \
            README.md \
            CHANGELOG.md
          printf 'ASSET_NAME=%s\n' "$ASSET_NAME" >> "$GITHUB_ENV"
        shell: bash

      - name: Create GitHub release and upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "Release ${{ github.ref_name }}" \
            --notes "See CHANGELOG.md for release details." \
            "$ASSET_NAME"
        shell: bash
