name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node .github/scripts/sync-release-version.mjs
          npx biome format --write package.json package-lock.json gemini-extension.json

      - name: Verify release build
        run: npm run check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node .github/scripts/sync-release-version.mjs
          npx biome format --write package.json package-lock.json gemini-extension.json

      - name: Verify release build
        run: npm run check

      - name: Create release archive
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ASSET_BASE="gemini-augment-${GITHUB_REF_NAME}"
          tar -czf "${ASSET_BASE}.tar.gz" \
            dist \
            commands \
            gemini-extension.json \
            package.json \
            package-lock.json \
            GEMINI.md \
            README.md \
            CHANGELOG.md
          zip -r "${ASSET_BASE}.zip" \
            dist \
            commands \
            gemini-extension.json \
            package.json \
            package-lock.json \
            GEMINI.md \
            README.md \
            CHANGELOG.md
          printf 'ASSET_TGZ=%s\n' "${ASSET_BASE}.tar.gz" >> "$GITHUB_ENV"
          printf 'ASSET_ZIP=%s\n' "${ASSET_BASE}.zip" >> "$GITHUB_ENV"
        shell: bash

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "Release ${{ github.ref_name }}" \
            --notes "See CHANGELOG.md for release details." \
            "$ASSET_TGZ" \
            "$ASSET_ZIP"
        shell: bash
