name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node .github/scripts/sync-release-version.mjs
          npx biome format --write package.json package-lock.json gemini-extension.json

      - name: Verify release build
        run: npm run check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node .github/scripts/sync-release-version.mjs
          npx biome format --write package.json package-lock.json gemini-extension.json

      - name: Verify release build
        run: npm run check

      - name: Create platform-specific release archives
        run: |
          NAME="gemini-augment"
          ARCHIVE_FILES=(
            dist/index.js
            commands
            gemini-extension.json
            package.json
            GEMINI.md
            README.md
            CHANGELOG.md
          )

          # tar.gz for darwin and linux (arm64 + x64)
          for PLATFORM in darwin linux; do
            for ARCH in arm64 x64; do
              ASSET="${PLATFORM}.${ARCH}.${NAME}.tar.gz"
              tar -czf "$ASSET" "${ARCHIVE_FILES[@]}"
              echo "Created $ASSET"
            done
          done

          # zip for win32 (x64 only)
          ASSET="win32.x64.${NAME}.zip"
          zip -r "$ASSET" "${ARCHIVE_FILES[@]}"
          echo "Created $ASSET"
        shell: bash

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME="gemini-augment"
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "Release ${{ github.ref_name }}" \
            --notes "See CHANGELOG.md for release details." \
            "darwin.arm64.${NAME}.tar.gz" \
            "darwin.x64.${NAME}.tar.gz" \
            "linux.arm64.${NAME}.tar.gz" \
            "linux.x64.${NAME}.tar.gz" \
            "win32.x64.${NAME}.zip"
        shell: bash
